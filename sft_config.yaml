# sft_config.yaml
model_name_or_path: C:/Users/98689/.cache/modelscope/hub/models/Qwen/Qwen3-0___6B
stage: sft
do_train: true
finetuning_type: lora

# QLoRA核心参数
quantization_bit: 4        # 4bit量化，显存从6G→3G的关键
lora_rank: 8               # rank=8
lora_alpha: 16
lora_target: q_proj,v_proj

dataset: underwater_acoustics  # 数据集名
template: qwen
cutoff_len: 512
max_samples: 5000
max_grad_norm: 1.0
# 训练参数
output_dir: ./output/qwen3_sft
num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 1.0e-4
lr_scheduler_type: cosine
gradient_checkpointing: true         # 用时间换显存，速度变慢但省显存
optim: adamw_8bit                    # 8bit优化器，省显存
# 评估
val_size: 0.1
eval_steps: 100
save_steps: 500